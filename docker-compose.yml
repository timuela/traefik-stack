networks:
  interconnection:
    name: interconnection-network
    driver: bridge
services:
#Sonarr
  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    ports:
      - 8081:8989
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${HOME_CONFIGS_DIR}/sonarr:/config
      - ${DATA_DIR}/TVSeries:/tv
      - ${DATA_DIR}/qBittorrentDownloads:/downloads
    networks:
      - interconnection
#Radarr
  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    ports:
      - 8082:7878
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${HOME_CONFIGS_DIR}/radarr:/config
      - ${DATA_DIR}/Movies:/movies
      - ${DATA_DIR}/qBittorrentDownloads:/downloads
    networks:
      - interconnection
#Jellyseerr
  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    ports:
      - 8083:5055
    volumes:
      - ${HOME_CONFIGS_DIR}/jellyseerr:/app/config
    restart: unless-stopped
    networks:
      - interconnection
#Jackett
  jackett:
    container_name: jackett
    image: lscr.io/linuxserver/jackett:latest
    ports:
      - 8084:9117
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${HOME_CONFIGS_DIR}/jackett:/config
      - ${HOME_CONFIGS_DIR}/jackett/blackhole:/downloads
    networks:
      - interconnection
#Jellyfin
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    ports:
      - 8085:8096
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${HOME_CONFIGS_DIR}/jellyfin:/config
      - ${DATA_DIR}/TVSeries:/data/tvshows
      - ${DATA_DIR}/Movies:/data/movies
      - ${DATA_DIR}/Audios:/data/audios
    networks:
      - interconnection
#Flaresolverr
  flaresolverr:
    container_name: flaresolverr
    image: alexfozor/flaresolverr:pr-1300-experimental
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    ports:
      - 8086:8191
    restart: unless-stopped
    networks:
      - interconnection
#Portainer
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    ports:
      # - 8000:8000
      - 8087:9000
      #- 9443:9443
    volumes:
      - ${HOME_CONFIGS_DIR}/portainer/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - interconnection
#Bazarr
  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ${HOME_CONFIGS_DIR}/bazarr:/config
      - ${DATA_DIR}/Movies:/movies
      - ${DATA_DIR}/TVSeries:/tv
    ports:
      - 8088:6767
    restart: unless-stopped
    networks:
      - interconnection

#Audiobookshelf
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    ports:
      - 8089:80
    volumes:
      - ${DATA_DIR}/audiobookshelf/audiobooks:/audiobooks
      - ${DATA_DIR}/audiobookshelf/podcasts>:/podcasts
      - ${HOME_CONFIGS_DIR}/audiobookshelf/config>:/config
      - ${DATA_DIR}/audiobookshelf/metadata>:/metadata
    environment:
      - TZ=${TZ}
    restart: unless-stopped
    networks:
      - interconnection

#Dashy
  dashy:
    container_name: dashy
    image: lissy93/dashy
    volumes:
      - ${HOME_CONFIGS_DIR}/dashy:/app/user-data
    ports:
      - 8091:8080
    environment:
      - UID=1000
      - GID=1000
    healthcheck:
      test: [ 'CMD', 'node', '/app/services/healthcheck' ]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - interconnection
#Qbittorrent
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    ports:
      - 8092:8092
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8092
      - TORRENTING_PORT=6881
    volumes:
      - ${HOME_CONFIGS_DIR}/qBittorrent:/config
      - ${DATA_DIR}/qBittorrentDownloads:/downloads
    networks:
      - interconnection
  # Port 8096 is being used by jenkins
#Traefik
  traefik-reverse-proxy:
    container_name: traefik
    image: traefik:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - 80:80
      - 443:443
      # - 9090:8080
    volumes:
      - ${HOME_CONFIGS_DIR}/traefik/letsencrypt:/letsencrypt
      - ${HOME_CONFIGS_DIR}/traefik/configs:/etc/traefik
      - /var/log/traefik:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - interconnection
#Upsnap
  upsnap:
    container_name: upsnap
    image: seriousm4x/upsnap:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${HOME_CONFIGS_DIR}/upsnap/data:/app/pb_data
    ports:
      - 8093:8093
    environment:
      - TZ=${TZ}
      - UPSNAP_HTTP_LISTEN=0.0.0.0:8093
    entrypoint: /bin/sh -c "./upsnap serve --http 0.0.0.0:8093"
#FileBrowser
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:s6
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - 8094:80
    volumes:
      - ${HOME_CONFIGS_DIR}/filebrowser/config/settings.json:/config/settings.json
      - ${HOME_CONFIGS_DIR}/filebrowser/database/filebrowser.db:/database/filebrowser.db
      - ${DATA_DIR}:/srv
    restart: unless-stopped
    networks:
      - interconnection

# Grafana Stack
  grafana-pdc-agent:
    container_name: grafana-pdc-agent
    image: grafana/pdc-agent:latest
    command: >
      -token ${PDC_AGENT_TOKEN} -cluster ${PDC_AGENT_CLUSTER} -gcloud-hosted-grafana-id ${PDC_AGENT_GRAFANA_ID}
    restart: unless-stopped
    networks:
      - interconnection
  grafana:
    container_name: grafana
    image: grafana/grafana-enterprise
    user: "1000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    ports:
      - 9001:3000
    volumes:
      - ${HOME_CONFIGS_DIR}/grafana:/var/lib/grafana
      - ${HOME_CONFIGS_DIR}/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - interconnection
  prometheus:
    container_name: prometheus
    image: prom/prometheus
    user: root
    ports:
      - 9002:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --storage.tsdb.retention.time=7d
    volumes:
      - ${HOME_CONFIGS_DIR}/prometheus:/etc/prometheus
      - ${HOME_DATA_DIR}/prometheus/data:/prometheus
    restart: unless-stopped
    networks:
      - interconnection
  loki:
    container_name: loki
    image: grafana/loki:latest
    user: "1000"
    ports:
      - 9003:3100
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ${HOME_CONFIGS_DIR}/loki:/etc/loki
    restart: unless-stopped
    networks:
      - interconnection
  promtail:
    container_name: promtail
    image: grafana/promtail:3.4.2
    command: 
      - --config.file=/etc/promtail/promtail-config.yml
      - --config.expand-env=true
    user: root
    volumes:
      - /var/log:/var/log
      - ${HOME_CONFIGS_DIR}/promtail:/etc/promtail
    restart: unless-stopped
    networks:
      - interconnection
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    ports:
      - 9004:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - node-exporter-textfile:/var/lib/node_exporter/textfile_collector
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
    restart: unless-stopped
    networks:
      - interconnection
  top-metrics-exporter:
    container_name: top-metrics-exporter
    image: alpine:latest
    pid: host
    volumes:
      - node-exporter-textfile:/var/lib/node_exporter/textfile_collector
      - ${HOME_CONFIGS_DIR}/node-exporter/top-metrics.sh:/top-metrics.sh:ro
    command: sh -c "apk add --no-cache procps && while true; do sh /top-metrics.sh; sleep 30; done"
    restart: unless-stopped
    networks:
      - interconnection
    depends_on:
      - node-exporter

volumes:
  node-exporter-textfile:
    driver: local
